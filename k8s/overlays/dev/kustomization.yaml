apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ecommerce

resources:
  - namespace.yaml
  - ../../base/backend
  - ../../base/frontend
  - ../../base/postgres

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: backend
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: frontend

images:
  - name: ecommerce-backend
    newTag: latest
  - name: ecommerce-frontend
    newTag: latest
